<section class="featured-services-section py-5 bg-light">
  <div class="container">
    <h2 class="text-center mb-5 section-title">Nuestros Servicios Destacados</h2>
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
      <div class="col" *ngFor="let service of services">
        <div class="card h-100 service-card border-0 shadow-sm">
          <img [src]="service.imageUrl" class="card-img-top service-img" alt="{{ service.name }}">
          <div class="card-body text-center">
            <h5 class="card-title service-title">{{ service.name }}</h5>
            <p class="card-text service-description">{{ service.description }}</p>
            <a [routerLink]="service.link" class="btn btn-outline-primary service-btn">Ver Más</a>
          </div>
        </div>
      </div>
    </div>
    <div class="text-center mt-5">
      <a routerLink="/servicios" class="btn btn-lg btn-secondary-custom">Ver Todos los Servicios</a>
    </div>
  </div>
</section>
