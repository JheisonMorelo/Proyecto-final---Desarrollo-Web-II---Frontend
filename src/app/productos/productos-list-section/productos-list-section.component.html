<section class="py-5 products-list-section">
    <div class="container">
        <h2 class="display-5 fw-bold text-center text-dark mb-5 animate__animated animate__fadeInDown">Nuestra Colección</h2>
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
            <div class="col animate__animated animate__fadeInUp" *ngFor="let product of products; let i = index" [style.--animate-delay]="(i * 0.1) + 's'">
                <div class="product-card h-100 shadow-sm border-0">
                    <img [src]="product.image" class="card-img-top" [alt]="product.name">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold text-pink">{{ product.name }}</h5>
                        <p class="card-text text-muted flex-grow-1">{{ product.description }}</p>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span class="fw-bold fs-5 text-dark">{{ product.price }}</span>
                            <button class="btn btn-sm btn-outline-primary">Comprar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="text-center mt-5">
            <a routerLink="/contacto" class="btn btn-primary btn-lg animate__animated animate__fadeInUp animate__delay-0-8s">
                <i class="bi bi-cart me-2"></i> Consultar Disponibilidad
            </a>
        </div>
    </div>
</section>
