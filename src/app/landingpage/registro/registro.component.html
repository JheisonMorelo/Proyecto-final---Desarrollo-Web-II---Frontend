<div class="login-register-page d-flex align-items-center justify-content-center py-5">
    <div class="card p-4 shadow-lg animate__animated animate__fadeInUp" style="width: 100%; max-width: 480px; border-radius: 15px;">
        <div class="text-center mb-4">
            <img src="/images/logoEstetica.jpg" alt="Logo" class="form-logo mb-3">
            <h2 class="card-title text-pink fw-bold mb-0">Crea tu Cuenta</h2>
            <p class="text-muted small">Únete a la comunidad de Maria Camila Estética</p>
        </div>
        <form>
            <div class="mb-3 form-floating">
                <input
                    type="text"
                    class="form-control"
                    id="fullNameRegister"
                    placeholder="Tu Nombre Completo"
                    value=""
                >
                <label for="fullNameRegister">Nombre Completo</label>
            </div>
            <div class="mb-3 form-floating">
                <input
                    type="email"
                    class="form-control"
                    id="emailRegister"
                    placeholder="name@example.com"
                    value=""
                >
                <label for="emailRegister">Correo Electrónico</label>
            </div>
            <div class="mb-3 form-floating">
                <input
                    type="password"
                    class="form-control"
                    id="passwordRegister"
                    placeholder="Contraseña"
                    value=""
                >
                <label for="passwordRegister">Contraseña</label>
            </div>
            <div class="mb-4 form-floating">
                <input
                    type="password"
                    class="form-control"
                    id="confirmPasswordRegister"
                    placeholder="Confirmar Contraseña"
                    value=""
                >
                <label for="confirmPasswordRegister">Confirmar Contraseña</label>
            </div>

            <div class="d-grid gap-2 mb-3">
                <button type="submit" class="btn btn-primary btn-lg">Registrarse</button>
            </div>
            <hr class="my-4">
            <p class="text-center text-muted">¿Ya tienes cuenta?</p>
            <div class="d-grid gap-2">
                <a routerLink="/iniciar-sesion" class="btn btn-outline-secondary btn-lg">Iniciar Sesión</a>
            </div>
        </form>
    </div>
</div>
